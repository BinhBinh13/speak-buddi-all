<style>
        /* Custom animation for the success icon */
        @keyframes scale-in {

            animation: scale-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        /* Subtle particle animations */
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-40px) scale(0.5); opacity: 0; }
        }
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--particle-color);
            opacity: 0;
            animation: float-up 2s ease-out forwards;

<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md text-body-md antialiased text-on-background relative overflow-hidden">

<button class="w-full bg-transparent text-primary font-label-md text-label-md py-3 px-6 rounded-lg border-2 border-primary hover:bg-primary-fixed/20 transition-colors">
                Download Receipt
            </button>

<script>
        // Lightweight JS to generate a few subtle confetti particles around the icon
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('particles-container');
            const colors = ['#6cf8bb', '#4edea3', '#c3c0ff']; // secondary-container, secondary-fixed-dim, inverse-primary
            
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Randomize position around center
                const angle = Math.random() * Math.PI * 2;
                const radius = 40 + Math.random() * 40;
                const tx = Math.cos(angle) * radius;
                const ty = Math.sin(angle) * radius - 20; // Bias upwards slightly
                
                particle.style.transform = `translate(${tx}px, ${ty}px)`;
                particle.style.setProperty('--particle-color', colors[Math.floor(Math.random() * colors.length)]);
                particle.style.setProperty('--delay', `${Math.random() * 0.4}s`);
                
                container.appendChild(particle);
            }
        });
    </script>

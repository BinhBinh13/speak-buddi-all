<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-surface min-h-screen flex items-center justify-center p-margin-mobile relative overflow-hidden text-on-surface font-body-md">
<div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30rem] h-[30rem] bg-secondary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-xl shadow-primary/5 p-lg md:p-xl relative z-10 border border-outline-variant/30">
<div class="text-center mb-xl">
<div class="font-display text-h3 text-primary mb-md inline-flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">record_voice_over</span>
                SpeakBuddi
            </div>
<h1 class="font-h2 text-h2 text-on-surface mb-xs">Quên mật khẩu?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Đừng lo lắng, hãy nhập email của bạn và chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu.
            </p>
</div>
<form action="#" class="space-y-md" method="POST" onsubmit="event.preventDefault(); document.getElementById('success-toast').classList.remove('translate-y-[-150%]', 'opacity-0'); setTimeout(() =&gt; document.getElementById('success-toast').classList.add('translate-y-[-150%]', 'opacity-0'), 3000);">
<div>
<label class="font-label-md text-label-md text-on-surface mb-base block" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="w-full pl-xl pr-sm py-xs h-12 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface font-body-md text-body-md placeholder-outline focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="email" name="email" placeholder="Nhập địa chỉ email của bạn" required="" type="email"/>
</div>
</div>
<button class="w-full h-12 bg-primary text-on-primary font-label-md text-label-md font-bold rounded-xl hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-lowest transition-colors flex items-center justify-center gap-xs shadow-sm" type="submit">
<span>Gửi yêu cầu</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="mt-xl text-center">
<a class="inline-flex items-center gap-base font-label-md text-label-md text-primary hover:text-primary-container hover:underline underline-offset-4 transition-colors" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                Quay lại Đăng nhập
            </a>
</div>
</div>
<div class="fixed top-xl left-1/2 -translate-x-1/2 translate-y-[-150%] opacity-0 transition-all duration-300 z-50 bg-secondary-container text-on-secondary-container px-lg py-xs rounded-lg shadow-lg flex items-center gap-sm" id="success-toast">
<span class="material-symbols-outlined">check_circle</span>
<span class="font-label-md text-label-md">Đã gửi hướng dẫn đến email của bạn.</span>
</div>
</body></html>

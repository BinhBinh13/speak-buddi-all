<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpeakBuddi - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#f3effc",
                        "on-background": "#1b1b24",
                        "surface-container-highest": "#e4e1ee",
                        "secondary-container": "#6cf8bb",
                        "on-primary-fixed": "#0f0069",
                        "on-secondary-fixed": "#002113",
                        "inverse-surface": "#302f39",
                        "on-secondary-fixed-variant": "#005236",
                        "tertiary-container": "#a44100",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f5f2ff",
                        "surface-bright": "#fcf8ff",
                        "on-tertiary-container": "#ffd2be",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffdbcc",
                        "tertiary": "#7e3000",
                        "surface-dim": "#dcd8e5",
                        "primary-fixed": "#e2dfff",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#6ffbbe",
                        "error-container": "#ffdad6",
                        "surface-container": "#f0ecf9",
                        "outline": "#777587",
                        "surface-tint": "#4d44e3",
                        "secondary-fixed-dim": "#4edea3",
                        "surface-variant": "#e4e1ee",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-surface-variant": "#464555",
                        "primary-container": "#4f46e5",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "primary": "#3525cd",
                        "background": "#fcf8ff",
                        "on-tertiary-fixed": "#351000",
                        "surface-container-high": "#eae6f4",
                        "on-primary": "#ffffff",
                        "surface": "#fcf8ff",
                        "on-primary-container": "#dad7ff",
                        "inverse-primary": "#c3c0ff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb695",
                        "secondary": "#006c49",
                        "on-surface": "#1b1b24",
                        "outline-variant": "#c7c4d8",
                        "on-secondary-container": "#00714d",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-error-container": "#93000a"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    spacing: {
                        "max-width": "1280px",
                        base: "4px",
                        "margin-mobile": "16px",
                        lg: "2rem",
                        md: "1.5rem",
                        xl: "3rem",
                        "margin-desktop": "64px",
                        sm: "1rem",
                        xs: "0.5rem",
                        gutter: "16px"
                    },
                    fontFamily: {
                        "body-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "h1": ["Be Vietnam Pro"],
                        "h3": ["Be Vietnam Pro"],
                        "h1-mobile": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "display": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "h2": ["Be Vietnam Pro"]
                    },
                    fontSize: {
                        "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "h1": ["32px", { lineHeight: "1.25", fontWeight: "700" }],
                        "h3": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
                        "h1-mobile": ["28px", { lineHeight: "1.25", fontWeight: "700" }],
                        "label-md": ["14px", { lineHeight: "1.4", fontWeight: "500" }],
                        "display": ["48px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "label-sm": ["12px", { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600" }],
                        "h2": ["24px", { lineHeight: "1.3", fontWeight: "600" }]
                    }
                }
            }
        };
    </script>
<style>
        .chip-selected {
            @apply bg-primary-container text-on-primary-container border-primary-container ring-2 ring-primary ring-offset-2 ring-offset-surface;
        }
        .chip-unselected {
            @apply bg-surface-container-highest text-on-surface border-transparent hover:bg-surface-variant transition-colors;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Area (Simplified for Onboarding) -->
<header class="w-full flex justify-between items-center px-margin-mobile md:px-margin-desktop py-md max-w-max-width mx-auto">
<div class="text-h2 font-h2 font-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
            SpeakBuddi
        </div>
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center p-2 rounded-full hover:bg-surface-container-high">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col justify-center items-center px-margin-mobile md:px-margin-desktop w-full max-w-3xl mx-auto py-xl">
<!-- Progress Indicator -->
<div class="w-full max-w-md mb-lg">
<div class="flex justify-between items-center mb-2">
<span class="text-label-sm font-label-sm text-outline uppercase tracking-wider">Bước 3/3</span>
<span class="text-label-sm font-label-sm text-primary font-bold">Gần xong rồi!</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-full rounded-full transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Header Content -->
<div class="text-center mb-xl w-full">
<h1 class="text-h1-mobile md:text-h1 font-h1-mobile md:font-h1 text-on-background mb-4">Bạn quan tâm đến chủ đề nào?</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant max-w-lg mx-auto">
                Chọn ít nhất 3 chủ đề để SpeakBuddi cá nhân hóa lộ trình học tiếng Anh dành riêng cho bạn.
            </p>
</div>
<!-- Interest Selection Grid (Bento/Chip Style) -->
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 w-full" id="interest-grid">
<!-- Chip 1: Công nghệ -->
<button class="chip-unselected flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all duration-200 group relative overflow-hidden" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-4xl mb-3 text-secondary group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">devices</span>
<span class="text-body-md font-body-md font-semibold text-center z-10 relative">Công nghệ</span>
</button>
<!-- Chip 2: Âm nhạc -->
<button class="chip-unselected flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all duration-200 group relative overflow-hidden" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-4xl mb-3 text-tertiary group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">music_note</span>
<span class="text-body-md font-body-md font-semibold text-center z-10 relative">Âm nhạc</span>
</button>
<!-- Chip 3: Phim ảnh -->
<button class="chip-unselected flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all duration-200 group relative overflow-hidden" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-4xl mb-3 text-primary group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">movie</span>
<span class="text-body-md font-body-md font-semibold text-center z-10 relative">Phim ảnh</span>
</button>
<!-- Chip 4: Kinh doanh -->
<button class="chip-unselected flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all duration-200 group relative overflow-hidden" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-4xl mb-3 text-on-surface-variant group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">business_center</span>
<span class="text-body-md font-body-md font-semibold text-center z-10 relative">Kinh doanh</span>
</button>
<!-- Chip 5: Thể thao -->
<button class="chip-unselected flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all duration-200 group relative overflow-hidden" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-4xl mb-3 text-secondary group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
<span class="text-body-md font-body-md font-semibold text-center z-10 relative">Thể thao</span>
</button>
<!-- Chip 6: Ẩm thực -->
<button class="chip-unselected flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all duration-200 group relative overflow-hidden" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-4xl mb-3 text-tertiary group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">restaurant</span>
<span class="text-body-md font-body-md font-semibold text-center z-10 relative">Ẩm thực</span>
</button>
<!-- Chip 7: Khoa học -->
<button class="chip-unselected flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all duration-200 group relative overflow-hidden" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-4xl mb-3 text-primary group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">science</span>
<span class="text-body-md font-body-md font-semibold text-center z-10 relative">Khoa học</span>
</button>
<!-- Chip 8: Du lịch -->
<button class="chip-unselected flex flex-col items-center justify-center p-6 rounded-xl border-2 transition-all duration-200 group relative overflow-hidden" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-4xl mb-3 text-on-surface-variant group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">flight_takeoff</span>
<span class="text-body-md font-body-md font-semibold text-center z-10 relative">Du lịch</span>
</button>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface dark:bg-inverse-surface shadow-[0px_-4px_12px_rgba(0,0,0,0.04)] z-50 px-margin-mobile py-md md:px-margin-desktop flex justify-between items-center">
<button class="flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors px-4 py-2 font-label-md text-label-md">
<span class="material-symbols-outlined mr-2">arrow_back</span>
            Quay lại
        </button>
<button class="flex items-center justify-center bg-surface-container-highest text-outline cursor-not-allowed rounded-full px-8 py-3 font-label-md text-label-md transition-all duration-200" id="cta-button">
            Hoàn tất &amp; Bắt đầu học
            <span class="material-symbols-outlined ml-2">check_circle</span>
</button>
</div>
<script>
        let selectedCount = 0;
        const ctaButton = document.getElementById('cta-button');

        function toggleChip(button) {
            const isSelected = button.classList.contains('chip-selected');
            
            if (isSelected) {
                button.classList.remove('chip-selected');
                button.classList.add('chip-unselected');
                selectedCount--;
            } else {
                button.classList.remove('chip-unselected');
                button.classList.add('chip-selected');
                selectedCount++;
            }
            
            updateCTA();
        }

        function updateCTA() {
            if (selectedCount >= 3) {
                ctaButton.classList.remove('bg-surface-container-highest', 'text-outline', 'cursor-not-allowed');
                ctaButton.classList.add('bg-primary', 'text-on-primary', 'hover:bg-primary-container', 'hover:text-on-primary-container', 'shadow-lg', 'hover:scale-105', 'cursor-pointer');
            } else {
                ctaButton.classList.add('bg-surface-container-highest', 'text-outline', 'cursor-not-allowed');
                ctaButton.classList.remove('bg-primary', 'text-on-primary', 'hover:bg-primary-container', 'hover:text-on-primary-container', 'shadow-lg', 'hover:scale-105', 'cursor-pointer');
            }
        }
    </script>
</body></html>

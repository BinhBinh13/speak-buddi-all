<style>
        /* Essential styles for 3D flip effect not easily handled by pure utilities */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* Subtle atmospheric background pattern */
        .bg-pattern {
            background-image: radial-gradient(var(--tw-colors-primary-fixed) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.3;
        }

        /* Prevent text selection on flashcard */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col relative overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 bg-pattern pointer-events-none z-0"></div>
<div class="absolute top-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed opacity-40 blur-[100px] pointer-events-none z-0"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-tertiary-fixed opacity-30 blur-[80px] pointer-events-none z-0"></div>
<!-- Task-Focused Header (Suppressed global nav for focus) -->
<header class="w-full px-margin-mobile md:px-margin-desktop py-md flex items-center justify-between z-10 relative">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="flex flex-col items-center flex-1 px-4">
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest mb-1">Business English Deck</span>
<div class="w-full max-w-[200px] h-1.5 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-[45%] transition-all duration-500"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant mt-1">12 / 28 Cards</span>
</div>
<button aria-label="Settings" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">more_vert</span>
</button>
</header>
<!-- Main Canvas: Flashcard Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop z-10 relative pb-xl">
<!-- Stack effect behind main card -->
<div class="relative w-full max-w-md aspect-[3/4] md:aspect-[4/3] perspective-1000 group cursor-pointer no-select">
<!-- Background stacked card 2 -->
<div class="absolute inset-0 bg-surface-container-high rounded-3xl shadow-sm transform translate-y-4 scale-[0.9] border border-outline-variant/20 z-0"></div>
<!-- Background stacked card 1 -->
<div class="absolute inset-0 bg-surface-container rounded-3xl shadow-sm transform translate-y-2 scale-[0.95] border border-outline-variant/30 z-0"></div>
<!-- The Flashcard Container (Animates) -->
<div class="relative w-full h-full preserve-3d transition-transform duration-700 ease-[cubic-bezier(0.4,0.0,0.2,1)] z-10" id="flashcard-inner">
<!-- FRONT FACE (English) -->
<div class="absolute inset-0 backface-hidden bg-surface-container-lowest rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-outline-variant/20 flex flex-col p-lg md:p-xl">
<!-- Top Context Bar -->
<div class="flex justify-between items-start w-full">
<span class="px-3 py-1 bg-surface-container-highest text-on-surface-variant font-label-sm text-label-sm rounded-lg">Adjective</span>
<button aria-label="Play pronunciation" class="w-10 h-10 flex items-center justify-center rounded-full text-primary hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</button>
</div>
<!-- Core Content -->
<div class="flex-1 flex flex-col items-center justify-center text-center gap-4">
<h2 class="font-display text-display text-on-surface tracking-tight md:text-[56px]">Resilient</h2>
<span class="font-body-lg text-body-lg text-outline">/rɪˈzɪl.jənt/</span>
</div>
<!-- Hint / Footer -->
<div class="w-full flex justify-center text-on-surface-variant/50">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 0;">touch_app</span>
</div>
</div>
<!-- BACK FACE (Vietnamese / Details) -->
<div class="absolute inset-0 backface-hidden rotate-y-180 bg-surface-container-lowest rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-primary/20 flex flex-col p-lg md:p-xl overflow-hidden">
<!-- Top Context Bar -->
<div class="flex justify-end w-full">
<span class="material-symbols-outlined text-primary/20 text-4xl">translate</span>
</div>
<!-- Core Content -->
<div class="flex-1 flex flex-col items-center justify-center text-center gap-6">
<div>
<h2 class="font-h1 text-h1 text-primary mb-2">Kiên cường</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Có khả năng phục hồi nhanh chóng sau khó khăn.</p>
</div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="text-left w-full bg-surface-container-low p-4 rounded-2xl border border-outline-variant/20">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest block mb-2">Example</span>
<p class="font-body-md text-body-md text-on-surface">
                                "The local economy is highly <strong class="text-primary font-semibold">resilient</strong> despite the crisis."
                            </p>
<p class="font-body-md text-body-md text-on-surface-variant mt-1 text-[14px]">
                                "Nền kinh tế địa phương rất kiên cường bất chấp khủng hoảng."
                            </p>
</div>
</div>
</div>
</div>
</div>
<!-- Controls Area -->
<div class="w-full max-w-md mt-xl min-h-[60px] flex items-center justify-center relative">
<!-- State 1: Before Flip -->
<button class="absolute w-full py-4 bg-surface-container-highest hover:bg-outline-variant/40 text-on-surface font-label-md text-label-md rounded-2xl transition-all duration-300 transform scale-100 opacity-100 flex items-center justify-center gap-2" id="btn-flip">
<span class="material-symbols-outlined text-[20px]">flip</span>
                Tap to Flip
            </button>
<!-- State 2: After Flip (Action Buttons) -->
<div class="absolute w-full flex gap-4 transition-all duration-300 transform scale-95 opacity-0 pointer-events-none" id="btn-actions">
<button class="flex-1 py-4 flex items-center justify-center gap-2 rounded-2xl border-2 border-outline-variant text-on-surface-variant hover:border-tertiary hover:text-tertiary transition-colors font-label-md text-label-md bg-surface-container-lowest">
<span class="material-symbols-outlined text-[20px]">history</span>
                    Needs Review
                </button>
<button class="flex-1 py-4 flex items-center justify-center gap-2 rounded-2xl bg-primary text-on-primary hover:bg-on-primary-fixed-variant transition-colors font-label-md text-label-md shadow-sm">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    Known
                </button>
</div>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const flashcardInner = document.getElementById('flashcard-inner');
            const flashcardContainer = flashcardInner.parentElement;
            const btnFlip = document.getElementById('btn-flip');
            const btnActions = document.getElementById('btn-actions');
            let isFlipped = false;

            const toggleCard = () => {
                isFlipped = !isFlipped;
                
                if (isFlipped) {
                    flashcardInner.classList.add('rotate-y-180');
                    
                    // Hide Flip button
                    btnFlip.classList.remove('scale-100', 'opacity-100');
                    btnFlip.classList.add('scale-95', 'opacity-0', 'pointer-events-none');
                    
                    // Show Action buttons
                    btnActions.classList.remove('scale-95', 'opacity-0', 'pointer-events-none');
                    btnActions.classList.add('scale-100', 'opacity-100');
                } else {
                    flashcardInner.classList.remove('rotate-y-180');
                    
                    // Show Flip button
                    btnFlip.classList.remove('scale-95', 'opacity-0', 'pointer-events-none');
                    btnFlip.classList.add('scale-100', 'opacity-100');
                    
                    // Hide Action buttons
                    btnActions.classList.remove('scale-100', 'opacity-100');
                    btnActions.classList.add('scale-95', 'opacity-0', 'pointer-events-none');
                }
            };

            // Event Listeners
            flashcardContainer.addEventListener('click', toggleCard);
            btnFlip.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent double trigger if clicking exactly on button inside container
                toggleCard();
            });

            // Add subtle tilt effect on mousemove for desktop
            flashcardContainer.addEventListener('mousemove', (e) => {
                if(window.innerWidth < 768) return; // Disable on mobile
                const rect = flashcardContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Calculate rotation (max 5 degrees)
                const rotateX = ((y - centerY) / centerY) * -5;
                const rotateY = ((x - centerX) / centerX) * 5;
                
                // Apply rotation, preserving the flip state if active
                const currentTransform = isFlipped ? 'rotateY(180deg)' : '';
                flashcardInner.style.transform = `${currentTransform} rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            flashcardContainer.addEventListener('mouseleave', () => {
                if(window.innerWidth < 768) return;
                // Reset transform but keep flip state
                flashcardInner.style.transform = isFlipped ? 'rotateY(180deg)' : '';
            });
        });
    </script>
</body></html>

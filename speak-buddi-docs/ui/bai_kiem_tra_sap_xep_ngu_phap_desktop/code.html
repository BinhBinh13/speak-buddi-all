<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpeakBuddi - Grammar Mapping Practice</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#f0ecf9",
                        "on-tertiary-fixed": "#351000",
                        "error": "#ba1a1a",
                        "surface-dim": "#dcd8e5",
                        "secondary-fixed": "#6ffbbe",
                        "primary-container": "#4f46e5",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary": "#006c49",
                        "surface-variant": "#e4e1ee",
                        "tertiary": "#7e3000",
                        "inverse-primary": "#c3c0ff",
                        "surface": "#fcf8ff",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#f3effc",
                        "secondary-fixed-dim": "#4edea3",
                        "on-surface-variant": "#464555",
                        "tertiary-fixed-dim": "#ffb695",
                        "error-container": "#ffdad6",
                        "primary": "#3525cd",
                        "outline-variant": "#c7c4d8",
                        "surface-container-high": "#eae6f4",
                        "inverse-surface": "#302f39",
                        "outline": "#777587",
                        "surface-container-low": "#f5f2ff",
                        "on-secondary-fixed": "#002113",
                        "on-secondary-fixed-variant": "#005236",
                        "on-primary-fixed": "#0f0069",
                        "on-primary-container": "#dad7ff",
                        "on-tertiary-container": "#ffd2be",
                        "surface-container-highest": "#e4e1ee",
                        "surface-bright": "#fcf8ff",
                        "primary-fixed-dim": "#c3c0ff",
                        "tertiary-fixed": "#ffdbcc",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "on-surface": "#1b1b24",
                        "on-secondary-container": "#00714d",
                        "primary-fixed": "#e2dfff",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-background": "#1b1b24",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "background": "#fcf8ff",
                        "secondary-container": "#6cf8bb",
                        "tertiary-container": "#a44100",
                        "surface-tint": "#4d44e3",
                        "on-secondary": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-desktop": "64px",
                        "max-width": "1280px",
                        "xs": "0.5rem",
                        "sm": "1rem",
                        "base": "4px",
                        "md": "1.5rem",
                        "xl": "3rem",
                        "lg": "2rem",
                        "gutter": "16px",
                        "margin-mobile": "16px"
                    },
                    fontFamily: {
                        "label-md": ["Be Vietnam Pro", "sans-serif"],
                        "label-sm": ["Be Vietnam Pro", "sans-serif"],
                        "h1": ["Be Vietnam Pro", "sans-serif"],
                        "display": ["Be Vietnam Pro", "sans-serif"],
                        "body-lg": ["Be Vietnam Pro", "sans-serif"],
                        "body-md": ["Be Vietnam Pro", "sans-serif"],
                        "h2": ["Be Vietnam Pro", "sans-serif"],
                        "h1-mobile": ["Be Vietnam Pro", "sans-serif"],
                        "h3": ["Be Vietnam Pro", "sans-serif"]
                    },
                    fontSize: {
                        "label-md": ["14px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h1": ["32px", { "lineHeight": "1.25", "fontWeight": "700" }],
                        "display": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "h1-mobile": ["28px", { "lineHeight": "1.25", "fontWeight": "700" }],
                        "h3": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased selection:bg-primary/20 selection:text-primary">
<!-- Task Header (Suppresses Global Nav per guidelines) -->
<header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md border-b border-outline-variant/30 h-16 flex items-center px-margin-mobile md:px-margin-desktop transition-all">
<!-- Close/Back Action -->
<button aria-label="Exit Practice" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-variant/50 hover:text-on-surface transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="material-symbols-outlined">close</span>
</button>
<!-- Progress Indicator -->
<div class="flex-1 mx-4 md:mx-12 flex items-center max-w-2xl">
<div class="w-full bg-surface-variant rounded-full h-2.5 overflow-hidden">
<div class="bg-primary rounded-full h-2.5 transition-all duration-500 ease-out" style="width: 65%;"></div>
</div>
</div>
<!-- Secondary Status (e.g., Lives/Streak) -->
<div class="flex items-center gap-1.5 text-error px-3 py-1.5 rounded-full bg-error-container/30">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-label-md text-label-md text-on-error-container">4</span>
</div>
</header>
<!-- Main Practice Canvas -->
<main class="flex-1 mt-16 flex flex-col items-center w-full max-w-4xl mx-auto px-margin-mobile md:px-margin-desktop pt-8 pb-32 md:pt-16 md:pb-40">
<!-- Context & Instruction -->
<div class="w-full text-center mb-10 md:mb-16">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-surface-container-high text-on-surface-variant mb-4">
<span class="material-symbols-outlined text-[18px]">psychology</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Grammar Mapping</span>
</div>
<h1 class="font-h2 text-h2 md:font-h1 md:text-h1 text-on-surface mb-3">Complete the sentence</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xl mx-auto">
                Drag the correct grammatical fragments to form a sentence in the <strong class="text-primary font-semibold">Present Perfect Continuous</strong> tense.
            </p>
</div>
<!-- Construction Zone (Target Area) -->
<div class="w-full bg-surface-container-low rounded-[1.5rem] p-6 md:p-10 mb-12 border border-outline-variant/40 shadow-sm relative overflow-hidden">
<!-- Decorative subtle background element -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="relative z-10 flex flex-wrap items-center justify-center gap-4 md:gap-5 leading-loose">
<span class="font-h3 text-h3 text-on-surface">They</span>
<!-- Drop Slot 1 -->
<div class="min-w-[140px] md:min-w-[160px] h-14 md:h-16 rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-lowest/60 flex items-center justify-center transition-all duration-200 hover:border-primary/50 hover:bg-primary/5 relative group">
<span class="font-label-sm text-label-sm text-outline-variant group-hover:text-primary/50 absolute">Drop block here</span>
</div>
<!-- Drop Slot 2 -->
<div class="min-w-[140px] md:min-w-[160px] h-14 md:h-16 rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-lowest/60 flex items-center justify-center transition-all duration-200 hover:border-primary/50 hover:bg-primary/5 relative group">
<span class="font-label-sm text-label-sm text-outline-variant group-hover:text-primary/50 absolute">Drop block here</span>
</div>
<span class="font-h3 text-h3 text-on-surface">for the exam all morning.</span>
</div>
</div>
<!-- Divider -->
<div class="w-full flex items-center gap-4 mb-8 max-w-2xl">
<div class="h-px bg-outline-variant/30 flex-1"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Fragment Pool</span>
<div class="h-px bg-outline-variant/30 flex-1"></div>
</div>
<!-- Fragment Pool (Draggable Blocks) -->
<div class="w-full flex flex-wrap gap-4 md:gap-5 justify-center max-w-3xl">
<!-- Block 1 -->
<button class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl px-6 md:px-8 py-4 shadow-sm cursor-grab active:cursor-grabbing hover:-translate-y-1 hover:shadow-md transition-all duration-200 hover:border-primary/60 text-on-surface font-h3 text-h3 select-none touch-none focus:outline-none focus:ring-2 focus:ring-primary/50">
                have been
            </button>
<!-- Block 2 -->
<button class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl px-6 md:px-8 py-4 shadow-sm cursor-grab active:cursor-grabbing hover:-translate-y-1 hover:shadow-md transition-all duration-200 hover:border-primary/60 text-on-surface font-h3 text-h3 select-none touch-none focus:outline-none focus:ring-2 focus:ring-primary/50">
                studying
            </button>
<!-- Block 3 (Distractor) -->
<button class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl px-6 md:px-8 py-4 shadow-sm cursor-grab active:cursor-grabbing hover:-translate-y-1 hover:shadow-md transition-all duration-200 hover:border-primary/60 text-on-surface font-h3 text-h3 select-none touch-none focus:outline-none focus:ring-2 focus:ring-primary/50">
                are studying
            </button>
<!-- Block 4 (Distractor) -->
<button class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl px-6 md:px-8 py-4 shadow-sm cursor-grab active:cursor-grabbing hover:-translate-y-1 hover:shadow-md transition-all duration-200 hover:border-primary/60 text-on-surface font-h3 text-h3 select-none touch-none focus:outline-none focus:ring-2 focus:ring-primary/50">
                has been
            </button>
</div>
</main>
<!-- Action Footer (Fixed Bottom for focus) -->
<div class="fixed bottom-0 left-0 w-full bg-surface/95 backdrop-blur-md border-t border-outline-variant/20 p-4 md:p-6 z-40">
<div class="max-w-4xl mx-auto flex justify-between items-center px-2">
<!-- Secondary Action -->
<button class="px-6 py-3 rounded-full font-label-md text-label-md border-2 border-outline-variant text-on-surface-variant hover:bg-surface-variant hover:border-surface-variant transition-colors focus:outline-none focus:ring-2 focus:ring-outline/50">
                Skip
            </button>
<!-- Primary Action (Styled as active for demonstration, would be disabled until slots are filled in real app) -->
<button class="px-8 py-3.5 rounded-full font-label-md text-label-md bg-primary text-on-primary hover:bg-primary-fixed-dim hover:text-primary-fixed shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all active:scale-95 flex items-center gap-2 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:ring-offset-2 focus:ring-offset-surface">
                Check Answer
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</body></html>

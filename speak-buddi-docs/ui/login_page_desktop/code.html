<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập - SpeakBuddi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#005236",
                        "surface-variant": "#e4e1ee",
                        "on-primary-container": "#dad7ff",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#464555",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#0f0069",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#6ffbbe",
                        "on-primary-fixed-variant": "#3323cc",
                        "surface": "#fcf8ff",
                        "surface-container-high": "#eae6f4",
                        "primary-fixed-dim": "#c3c0ff",
                        "inverse-primary": "#c3c0ff",
                        "secondary-fixed-dim": "#4edea3",
                        "tertiary-fixed": "#ffdbcc",
                        "outline": "#777587",
                        "tertiary-container": "#a44100",
                        "inverse-surface": "#302f39",
                        "surface-dim": "#dcd8e5",
                        "on-tertiary-container": "#ffd2be",
                        "error-container": "#ffdad6",
                        "primary": "#3525cd",
                        "inverse-on-surface": "#f3effc",
                        "on-secondary-container": "#00714d",
                        "surface-bright": "#fcf8ff",
                        "primary-container": "#4f46e5",
                        "on-surface": "#1b1b24",
                        "surface-container-low": "#f5f2ff",
                        "surface-container": "#f0ecf9",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "secondary-container": "#6cf8bb",
                        "outline-variant": "#c7c4d8",
                        "background": "#fcf8ff",
                        "secondary": "#006c49",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#351000",
                        "surface-tint": "#4d44e3",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#002113",
                        "on-background": "#1b1b24",
                        "surface-container-highest": "#e4e1ee",
                        "tertiary": "#7e3000",
                        "primary-fixed": "#e2dfff",
                        "tertiary-fixed-dim": "#ffb695"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "64px",
                        "margin-mobile": "16px",
                        "sm": "1rem",
                        "xl": "3rem",
                        "base": "4px",
                        "xs": "0.5rem",
                        "max-width": "1280px",
                        "gutter": "16px",
                        "lg": "2rem",
                        "md": "1.5rem"
                    },
                    "fontFamily": {
                        "label-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "h1-mobile": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "display": ["Be Vietnam Pro"],
                        "h1": ["Be Vietnam Pro"],

                        "h2": ["Be Vietnam Pro"]

                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1-mobile": ["28px", { "lineHeight": "1.25", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h1": ["32px", { "lineHeight": "1.25", "fontWeight": "700" }],
                        "h3": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-4 md:p-6 relative overflow-hidden">
<!-- Decorative ambient background elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container rounded-full blur-[120px] opacity-30 z-0 pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary-container rounded-full blur-[100px] opacity-20 z-0 pointer-events-none"></div>
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-[24px] shadow-[0_8px_24px_rgba(53,37,205,0.06)] p-8 md:p-10 relative z-10 border border-surface-container-highest/50">
<!-- Header -->
<div class="flex flex-col items-center mb-8">
<div class="font-display text-h1 text-primary tracking-tight mb-2">SpeakBuddi</div>
<h1 class="font-h3 text-h3 text-on-surface">Đăng nhập</h1>
</div>
<!-- Error State -->
<div class="bg-error-container text-on-error-container p-4 rounded-lg flex items-center gap-3 mb-6 shadow-sm border border-error/10">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">error</span>
<p class="font-body-md text-label-md text-error">Email hoặc mật khẩu không đúng.</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-surface text-on-surface font-body-md text-body-md pl-10 pr-4 py-3 rounded-lg border border-error focus:border-error focus:ring-1 focus:ring-error outline-none transition-colors" id="email" name="email" placeholder="Nhập email của bạn" required="" type="email" value="user@example.com"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Mật khẩu</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface text-on-surface font-body-md text-body-md pl-10 pr-12 py-3 rounded-lg border border-error focus:border-error focus:ring-1 focus:ring-error outline-none transition-colors" id="password" name="password" placeholder="Nhập mật khẩu" required="" type="password" value="wrongpassword"/>
<button aria-label="Hiện mật khẩu" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" id="togglePassword" type="button">
<span class="material-symbols-outlined" id="toggleIcon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-3.5 rounded-[16px] mt-2 shadow-[0_4px_12px_rgba(53,37,205,0.2)] hover:bg-primary-fixed-variant hover:shadow-[0_6px_16px_rgba(53,37,205,0.3)] transition-all active:scale-[0.98]" type="submit">
                Đăng nhập
            </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="flex-1 h-px bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">hoặc</span>
<div class="flex-1 h-px bg-outline-variant"></div>
</div>
<!-- Google OAuth -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest border-2 border-outline-variant text-on-surface font-label-md text-label-md py-3 rounded-[16px] hover:bg-surface-variant hover:border-outline transition-all active:scale-[0.98]" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Tiếp tục với Google
        </button>
<!-- Sign Up Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-label-md text-on-surface-variant">
                Chưa có tài khoản? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Đăng ký</a>
</p>
</div>
</main>
<script>
        // Password toggle functionality
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            toggleIcon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            
            // Add a subtle scale animation
            toggleIcon.style.transform = 'scale(0.8)';
            setTimeout(() => {
                toggleIcon.style.transform = 'scale(1)';
            }, 100);
        });
    </script>
</body></html>

<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký - SpeakBuddi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#005236",
                        "surface-variant": "#e4e1ee",
                        "on-primary-container": "#dad7ff",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#464555",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#0f0069",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#6ffbbe",
                        "on-primary-fixed-variant": "#3323cc",
                        "surface": "#fcf8ff",
                        "surface-container-high": "#eae6f4",
                        "primary-fixed-dim": "#c3c0ff",
                        "inverse-primary": "#c3c0ff",
                        "secondary-fixed-dim": "#4edea3",
                        "tertiary-fixed": "#ffdbcc",
                        "outline": "#777587",
                        "tertiary-container": "#a44100",
                        "inverse-surface": "#302f39",
                        "surface-dim": "#dcd8e5",
                        "on-tertiary-container": "#ffd2be",
                        "error-container": "#ffdad6",
                        "primary": "#3525cd",
                        "inverse-on-surface": "#f3effc",
                        "on-secondary-container": "#00714d",
                        "surface-bright": "#fcf8ff",
                        "primary-container": "#4f46e5",
                        "on-surface": "#1b1b24",
                        "surface-container-low": "#f5f2ff",
                        "surface-container": "#f0ecf9",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "secondary-container": "#6cf8bb",
                        "outline-variant": "#c7c4d8",
                        "background": "#fcf8ff",
                        "secondary": "#006c49",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#351000",
                        "surface-tint": "#4d44e3",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#002113",
                        "on-background": "#1b1b24",
                        "surface-container-highest": "#e4e1ee",
                        "tertiary": "#7e3000",
                        "primary-fixed": "#e2dfff",
                        "tertiary-fixed-dim": "#ffb695"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "64px",
                        "margin-mobile": "16px",
                        "sm": "1rem",
                        "xl": "3rem",
                        "base": "4px",
                        "xs": "0.5rem",
                        "max-width": "1280px",
                        "gutter": "16px",
                        "lg": "2rem",
                        "md": "1.5rem"
                    },
                    "fontFamily": {
                        "label-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "h1-mobile": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "display": ["Be Vietnam Pro"],
                        "h1": ["Be Vietnam Pro"],
                        "h3": ["Be Vietnam Pro"],
                        "h2": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1-mobile": ["28px", { "lineHeight": "1.25", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h1": ["32px", { "lineHeight": "1.25", "fontWeight": "700" }],

                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]

            }
        }

</head>
<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-body-md text-on-background antialiased p-margin-mobile">
<!-- Suppressed Header/Nav as this is a linear transactional flow -->
<main class="w-full max-w-[440px]">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(53,37,205,0.04)] border border-surface-container p-lg relative overflow-hidden">
<!-- Subtle gradient decoration -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container opacity-20 rounded-bl-full -z-0"></div>
<div class="relative z-10 text-center mb-md">
<div class="font-display text-h1 text-primary tracking-tight mb-2">SpeakBuddi</div>
<h1 class="font-h3 text-h3 text-on-surface">Tạo tài khoản</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Bắt đầu hành trình học tiếng Anh của bạn.</p>
</div>
<!-- Form Error Message (Hidden by default, shown for validation example) -->
<div class="bg-error-container text-on-error-container p-3 rounded-lg mb-4 flex items-center gap-2 border border-error/20">
<span class="material-symbols-outlined text-error" data-icon="error">error</span>
<span class="font-label-md text-label-md">Vui lòng điền đầy đủ thông tin.</span>
</div>
<form class="space-y-4">
<!-- Name Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="fullName">Họ và tên</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="person">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-primary focus:border-primary text-on-surface placeholder-outline" id="fullName" placeholder="Nhập họ và tên" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-error rounded-lg bg-surface-container-lowest focus:ring-error focus:border-error text-on-surface placeholder-outline" id="email" placeholder="example@email.com" type="email" value="invalid-email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="password">Mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-primary focus:border-primary text-on-surface placeholder-outline" id="password" placeholder="Tạo mật khẩu" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Password Strength Indicator -->
<div class="mt-2">
<div class="flex justify-between font-label-sm text-label-sm text-on-surface-variant mb-1">
<span>Độ mạnh: Trung bình</span>
</div>
<div class="flex gap-1 h-1.5 w-full rounded-full overflow-hidden bg-surface-variant">
<div class="bg-secondary-fixed-dim w-1/3"></div>
<div class="bg-secondary-fixed-dim w-1/3"></div>
<div class="bg-surface-variant w-1/3"></div>
</div>
</div>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="confirmPassword">Xác nhận mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock_reset">lock_reset</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-primary focus:border-primary text-on-surface placeholder-outline" id="confirmPassword" placeholder="Nhập lại mật khẩu" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-full shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200 mt-6" type="submit">
                    Đăng ký
                </button>
</form>
<!-- Divider -->
<div class="mt-6">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center font-label-sm text-label-sm">
<span class="px-2 bg-surface-container-lowest text-on-surface-variant">hoặc</span>
</div>
</div>
</div>
<!-- OAuth Buttons -->
<div class="mt-6">
<button class="w-full flex justify-center items-center py-2.5 px-4 border border-outline-variant rounded-full shadow-sm bg-surface-container-lowest font-label-md text-label-md text-on-surface hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="button">
<!-- Placeholder for Google Icon -->
<svg class="w-5 h-5 mr-2" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Tiếp tục với Google
                </button>
</div>
<!-- Login Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Đã có tài khoản? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors duration-200" href="#">Đăng nhập</a>
</p>
</div>
</div>
</main>
<!-- Script for subtle interactive effects -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.querySelector('.material-symbols-outlined').classList.add('text-primary');
                    input.parentElement.querySelector('.material-symbols-outlined').classList.remove('text-outline');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.querySelector('.material-symbols-outlined').classList.remove('text-primary');
                    input.parentElement.querySelector('.material-symbols-outlined').classList.add('text-outline');
                });
            });
        });
    </script>
</body></html>

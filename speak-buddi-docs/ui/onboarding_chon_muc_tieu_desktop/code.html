<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpeakBuddi - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#f3effc",
                        "on-background": "#1b1b24",
                        "surface-container-highest": "#e4e1ee",
                        "secondary-container": "#6cf8bb",
                        "on-primary-fixed": "#0f0069",
                        "on-secondary-fixed": "#002113",
                        "inverse-surface": "#302f39",
                        "on-secondary-fixed-variant": "#005236",
                        "tertiary-container": "#a44100",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f5f2ff",
                        "surface-bright": "#fcf8ff",
                        "on-tertiary-container": "#ffd2be",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffdbcc",
                        "tertiary": "#7e3000",
                        "surface-dim": "#dcd8e5",
                        "primary-fixed": "#e2dfff",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#6ffbbe",
                        "error-container": "#ffdad6",
                        "surface-container": "#f0ecf9",
                        "outline": "#777587",
                        "surface-tint": "#4d44e3",
                        "secondary-fixed-dim": "#4edea3",
                        "surface-variant": "#e4e1ee",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-surface-variant": "#464555",
                        "primary-container": "#4f46e5",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "primary": "#3525cd",
                        "background": "#fcf8ff",
                        "on-tertiary-fixed": "#351000",
                        "surface-container-high": "#eae6f4",
                        "on-primary": "#ffffff",
                        "surface": "#fcf8ff",
                        "on-primary-container": "#dad7ff",
                        "inverse-primary": "#c3c0ff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb695",
                        "secondary": "#006c49",
                        "on-surface": "#1b1b24",
                        "outline-variant": "#c7c4d8",
                        "on-secondary-container": "#00714d",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max-width": "1280px",
                        "base": "4px",
                        "margin-mobile": "16px",
                        "lg": "2rem",
                        "md": "1.5rem",
                        "xl": "3rem",
                        "margin-desktop": "64px",
                        "sm": "1rem",
                        "xs": "0.5rem",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "h1": ["Be Vietnam Pro"],
                        "h3": ["Be Vietnam Pro"],
                        "h1-mobile": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "display": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "h2": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1": ["32px", { "lineHeight": "1.25", "fontWeight": "700" }],
                        "h3": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "h1-mobile": ["28px", { "lineHeight": "1.25", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "display": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Top Navigation Area (Minimal for Onboarding) -->
<header class="flex justify-between items-center px-margin-mobile md:px-margin-desktop py-md w-full max-w-max-width mx-auto bg-surface dark:bg-background flat no shadows">
<div class="text-h2 font-h2 font-bold text-primary dark:text-primary-fixed">
            SpeakBuddi
        </div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant dark:text-outline-variant hover:text-primary-container transition-colors">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
<button class="text-on-surface-variant dark:text-outline-variant hover:text-primary-container transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-xl max-w-max-width mx-auto w-full">
<!-- Progress Bar -->
<div class="w-full max-w-2xl mb-12">
<div class="flex justify-between text-label-sm font-label-sm text-outline mb-2">
<span>Bước 1 của 3</span>
</div>
<div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full w-1/3 rounded-full transition-all duration-500"></div>
</div>
</div>
<!-- Headline -->
<div class="text-center mb-12">
<h1 class="text-h1-mobile font-h1-mobile md:text-h1 md:font-h1 text-on-background mb-4">
                Mục tiêu chính của bạn là gì?
            </h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">
                Chọn mục tiêu để chúng tôi tạo lộ trình học phù hợp nhất cho bạn.
            </p>
</div>
<!-- Goal Selection Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6 w-full max-w-2xl">
<!-- Option 1 -->
<button class="group relative flex flex-col items-center justify-center p-8 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.04)] hover:shadow-[0px_8px_24px_rgba(0,0,0,0.06)] hover:border-primary transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-4 group-hover:bg-primary-container transition-colors duration-300">
<span class="material-symbols-outlined text-3xl text-primary group-hover:text-on-primary-container" data-icon="work">work</span>
</div>
<span class="text-h3 font-h3 text-on-surface">Giao tiếp công việc</span>
</button>
<!-- Option 2 -->
<button class="group relative flex flex-col items-center justify-center p-8 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.04)] hover:shadow-[0px_8px_24px_rgba(0,0,0,0.06)] hover:border-primary transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-4 group-hover:bg-primary-container transition-colors duration-300">
<span class="material-symbols-outlined text-3xl text-primary group-hover:text-on-primary-container" data-icon="flight_takeoff">flight_takeoff</span>
</div>
<span class="text-h3 font-h3 text-on-surface">Du lịch &amp; Khám phá</span>
</button>
<!-- Option 3 -->
<button class="group relative flex flex-col items-center justify-center p-8 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.04)] hover:shadow-[0px_8px_24px_rgba(0,0,0,0.06)] hover:border-primary transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-4 group-hover:bg-primary-container transition-colors duration-300">
<span class="material-symbols-outlined text-3xl text-primary group-hover:text-on-primary-container" data-icon="school">school</span>
</div>
<span class="text-h3 font-h3 text-on-surface">Luyện thi (IELTS/TOEIC)</span>
</button>
<!-- Option 4 -->
<button class="group relative flex flex-col items-center justify-center p-8 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.04)] hover:shadow-[0px_8px_24px_rgba(0,0,0,0.06)] hover:border-primary transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-4 group-hover:bg-primary-container transition-colors duration-300">
<span class="material-symbols-outlined text-3xl text-primary group-hover:text-on-primary-container" data-icon="psychology">psychology</span>
</div>
<span class="text-h3 font-h3 text-on-surface">Phát triển bản thân</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar (Transactional/Onboarding) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile py-md md:px-margin-desktop bg-surface dark:bg-inverse-surface shadow-[0px_-4px_12px_rgba(0,0,0,0.04)] shadow-lg">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-2 hover:scale-105 transition-transform">
<span class="material-symbols-outlined mb-1" data-icon="arrow_back">arrow_back</span>
<span class="text-label-md font-label-md">Back</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary dark:bg-primary-container text-on-primary dark:text-on-primary-container rounded-full px-8 py-3 hover:scale-105 transition-transform opacity-50 cursor-not-allowed" disabled="">
<span class="material-symbols-outlined mb-1" data-icon="arrow_forward">arrow_forward</span>
<span class="text-label-md font-label-md">Continue</span>
</button>
</nav>
<!-- Script for basic interaction -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.grid button');
            const continueBtn = document.querySelector('nav button:last-child');

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    // Remove active state from all
                    buttons.forEach(b => {
                        b.classList.remove('border-primary', 'bg-surface-container-low', 'ring-2', 'ring-primary');
                    });
                    
                    // Add active state to clicked
                    button.classList.add('border-primary', 'bg-surface-container-low', 'ring-2', 'ring-primary');
                    
                    // Enable continue button
                    continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    continueBtn.removeAttribute('disabled');
                    continueBtn.classList.add('shadow-[0px_4px_12px_rgba(0,0,0,0.1)]');
                });
            });
        });
    </script>
</body></html>
